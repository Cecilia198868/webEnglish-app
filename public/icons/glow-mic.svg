<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6C5CFF" stop-opacity="0.32"/>
      <stop offset="55%" stop-color="#6C5CFF" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#6C5CFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="micGradient" x1="142" y1="118" x2="348" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF5CF4"/>
      <stop offset="52%" stop-color="#675CFF"/>
      <stop offset="100%" stop-color="#4EDCFF"/>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix
        in="blur"
        type="matrix"
        values="1 0 0 0 0.33  0 1 0 0 0.24  0 0 1 0 1  0 0 0 0.88 0"
        result="coloredBlur"
      />
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="256" cy="256" r="205" fill="url(#bgGlow)"/>

  <circle
    cx="256"
    cy="256"
    r="171"
    stroke="url(#micGradient)"
    stroke-width="8"
    opacity="0.9"
    filter="url(#softGlow)"
  />

  <circle
    cx="256"
    cy="256"
    r="136"
    stroke="#7A6BFF"
    stroke-opacity="0.18"
    stroke-width="3"
  />

  <rect
    x="196"
    y="120"
    width="120"
    height="190"
    rx="60"
    fill="url(#micGradient)"
    filter="url(#softGlow)"
  />

  <path
    d="M180 255C180 310 215 345 256 345C297 345 332 310 332 255"
    stroke="url(#micGradient)"
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#softGlow)"
  />

  <line
    x1="256"
    y1="345"
    x2="256"
    y2="392"
    stroke="url(#micGradient)"
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#softGlow)"
  />

  <line
    x1="215"
    y1="400"
    x2="297"
    y2="400"
    stroke="url(#micGradient)"
    stroke-width="14"
    stroke-linecap="round"
    filter="url(#softGlow)"
  />
</svg>
